tasks:
  installDeps:
    name: Install dependencies
    description: Install the Python package and SDK dependencies.
    command: |
      python -m pip install -e .
    triggeredBy:
      - manual
      - postDevcontainerStart
      - prebuild

  watchEvents:
    name: Watch Ona events
    description: Subscribe to Ona WatchEvents and log received events to stdout.
    command: |
      ona-events
    triggeredBy:
      - manual
    dependsOn:
      - installDeps
